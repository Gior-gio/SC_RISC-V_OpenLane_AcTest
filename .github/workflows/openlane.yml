name: OpenLane

on:
  workflow_run:
    workflows: ["Setup OpenLane"]
    types:
      - completed

jobs:
  run-openlane:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download OpenLane setup
        uses: actions/download-artifact@v3
        with:
          name: openlane-setup
          path: OpenLane/

      - name: Run OpenLane Flow
        run: |
          cd OpenLane
          docker run --rm -v $(pwd)/Design:/work/designs/Design -w /work \
          theopenroad/openlane:latest \
          flow.tcl -design Design

      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: openlane-results
          path: OpenLane/runs/
